<!DOCTYPE html>
<html>
<head>

<title>Two Hearts ❤️</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="stars"></div>

<div class="main">

<h1 class="title">
❤️ Two Hearts ❤️
</h1>

<p class="sub">
A world hidden from everyone else.
Only us.
</p>

<button onclick="openWorld()">
Enter Our Universe ✨
</button>

</div>

<script>

function openWorld(){

document.body.innerHTML=`

<div class="inside">

<h1>💖 Welcome Back 💖</h1>

<p>
No matter where we go...
we somehow end up here.
</p>

<div class="heart">
❤️
</div>

</div>

`;

}

</script>

</body>
</html>
