<!DOCTYPE html>
<html>
<head>
<title>Lampy ❤️ Rose</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="stars"></div>

<nav>

<div class="logo">
Lampy ❤️ Rose ❤️
</div>

<div class="nav">

<button onclick="showTab('home')">🏠 Home</button>

<button onclick="showTab('games')">🎮 Games</button>

<button onclick="showTab('memories')">📸 Memories</button>

<button onclick="showTab('music')">🎵 Music</button>

<button onclick="showTab('secret')">✨ Secret</button>

</div>

</nav>


<div id="home" class="page active">

<h1>Lampy ❤️ Rose</h1>

<p>Our Tiny Universe</p>

<div class="grid">

<div class="card">
⏰
<div id="clock"></div>
</div>

<div class="card">
💖 Love:10000%
</div>

<div class="card">
📅
<div id="date"></div>
</div>

</div>

</div>


<div id="games" class="page">

<h2>Fun Zone 🎮</h2>

<div class="grid">

<div class="card" onclick="playGame('Spin Bottle points at YOU 😭')">
🎲 Spin Bottle
</div>

<div class="card" onclick="playGame('Truth: Favorite memory?')">
🎯 Truth Or Dare
</div>

<div class="card" onclick="playGame('Love score: 99999% ❤️')">
💘 Love Calculator
</div>

<div class="card" onclick="playGame('Achievement unlocked: Soulmates')">
🎁 Mystery Box
</div>

</div>

<div id="result"></div>

</div>


<div id="memories" class="page">

<h2>Memories 📸</h2>

<div class="grid">

<div class="card">📷 First Chat</div>

<div class="card">✨ First Chaos</div>

<div class="card">💞 First Memory</div>

</div>

</div>



<div id="music" class="page">

<h2>Music 🎵</h2>

<div class="grid">

<div class="card">
🎵 Favorite Song
</div>

<div class="card">
🌙 Night Vibes
</div>

</div>

</div>


<div id="secret" class="page">

<input
id="pass"
placeholder="password"
/>

<button onclick="unlock()">
Unlock
</button>

<h2 id="secretText"></h2>

</div>


<script>

function showTab(tab){

document
.querySelectorAll(
".page"
)

.forEach(x=>
x.classList.remove(
"active"
))

document
.getElementById(tab)
.classList.add(
"active"
)

}


function playGame(text){

document
.getElementById(
"result"
)

.innerText=text

}


function unlock(){

let p=
document
.getElementById(
"pass"
).value

if(
p==="lampyrose"
){

document
.getElementById(
"secretText"
)

.innerText=

"😭❤️ Secret unlocked"

}

else{

document
.getElementById(
"secretText"
)

.innerText=

"wrong password"

}

}


setInterval(()=>{

document
.getElementById(
"clock"
).innerText=
new Date()
.toLocaleTimeString()

document
.getElementById(
"date"
).innerText=
new Date()
.toDateString()

},1000)

</script>

</body>
</html>
